<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Club Mystery</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #f0fdf4; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; flex-direction: column; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 350px; margin-bottom: 20px; }
        #type { color: #2563eb; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; display: block; margin-bottom: 10px; }
        #content { font-size: 1.4rem; color: #1f2937; margin-bottom: 20px; min-height: 80px; display: flex; align-items: center; justify-content: center; line-height: 1.3; }
        
        #answer-box { display: none; color: #059669; font-weight: bold; margin: 15px 0; padding: 15px; border-top: 1px dashed #ddd; background: #f9fafb; border-radius: 10px; }
        
        /* Interactive Buttons */
        .btn { border: none; padding: 14px 24px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1rem; margin-top: 10px; transition: 0.2s; }
        .btn-ans { background: #f59e0b; color: white; }
        .btn-next { background: #4b5563; color: white; display: none; }
        .btn:active { transform: scale(0.95); }

        /* WhatsApp Section */
        .wa-container { margin-top: 10px; }
        .wa-link { display: inline-flex; align-items: center; justify-content: center; background: white; color: #1f2937; text-decoration: none; font-weight: bold; padding: 12px 24px; border-radius: 50px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #e5e7eb; transition: 0.2s; font-size: 1.1rem; }
        .wa-link:active { transform: scale(0.95); }
        .wa-icon { width: 24px; height: 24px; margin-left: 8px; fill: #25D366; }
    </style>
</head>
<body>

    <div class="card">
        <span id="type">Loading...</span>
        <div id="content">Reading the mystery...</div>
        
        <div id="answer-box"></div>

        <button id="ans-btn" class="btn btn-ans" onclick="revealAnswer()">Reveal Answer</button>
        <button id="next-btn" class="btn btn-next" onclick="loadNext()">Next</button>
    </div>

    <div class="wa-container">
        <a href="https://chat.whatsapp.com/IUc7l6fWtV1GsyCVFdBD5v?mode=gi_t" target="_blank" class="wa-link">
            Join Now
            <svg class="wa-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
                <path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/>
            </svg>
        </a>
    </div>

    <script>
        const items = [
            {t: "FACT", c: "The word 'set' has the most definitions in English."},
            {t: "JOKE", c: "Why was the math book sad?", a: "Because it had too many problems!"},
            {t: "RIDDLE", c: "What has a neck but no head?", a: "A bottle!"},
            {t: "DARE", c: "Say 'Hello' to someone in a British accent!"},
            {t: "FACT", c: "'Dreamt' is the only English word that ends in 'mt'."},
            {t: "JOKE", c: "What do you call a bear with no teeth?", a: "A gummy bear!"},
            {t: "RIDDLE", c: "What has to be broken before you can use it?", a: "An egg!"},
            {t: "DARE", c: "Recite the alphabet backwards in 15 seconds!"}
            // Add your other items here!
        ];

        function displayCurrentMystery() {
            let i = parseInt(localStorage.getItem('idx')) || 0;
            let item = items[i];
            
            document.getElementById('type').innerText = item.t;
            document.getElementById('content').innerText = item.c;
            
            // Hide answer box initially
            document.getElementById('answer-box').style.display = "none";
            
            if (item.a) {
                // If it has an answer (Joke/Riddle) -> Show Reveal, Hide Next
                document.getElementById('ans-btn').style.display = "block";
                document.getElementById('next-btn').style.display = "none";
                document.getElementById('answer-box').innerText = item.a;
            } else {
                // If it's a Fact/Dare -> Hide Reveal, Show Next immediately
                document.getElementById('ans-btn').style.display = "none";
                document.getElementById('next-btn').style.display = "block";
            }
        }

        function revealAnswer() {
            // Show the answer, hide the reveal button, and finally show the Next button
            document.getElementById('answer-box').style.display = "block";
            document.getElementById('ans-btn').style.display = "none";
            document.getElementById('next-btn').style.display = "block";
        }

        function loadNext() {
            // Move to the next item and refresh the display
            let i = parseInt(localStorage.getItem('idx')) || 0;
            localStorage.setItem('idx', (i + 1) % items.length);
            displayCurrentMystery();
        }

        // Run this when the page first opens
        window.onload = displayCurrentMystery;
    </script>
</body>
</html>
