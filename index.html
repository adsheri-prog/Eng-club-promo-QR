<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Club Mystery</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f4f4; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 350px; margin: auto; }
        #type { color: blue; font-weight: bold; text-transform: uppercase; }
        button { background: blue; color: white; border: none; padding: 10px 20px; border-radius: 5px; margin-top: 10px; cursor: pointer; }
        #ans-btn { background: orange; display: none; }
        #answer { display: none; color: green; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <p id="type">English Club Mystery</p>
        <h2 id="content">Scan to Start!</h2>
        <div id="answer"></div>
        <button id="ans-btn" onclick="showAnswer()">Show Answer</button>
        <br>
        <button onclick="runNext()">Next Mystery!</button>
    </div>

    <script>
        const items = [
            // ROUND 1
            {t: "FACT", c: "The word 'set' has the most definitions in English."},
            {t: "JOKE", c: "Why was the math book sad?", a: "Because it had too many problems!"},
            {t: "RIDDLE", c: "What has a neck but no head?", a: "A bottle!"},
            {t: "DARE", c: "Say 'Hello' to someone in a British accent!"},
            // ROUND 2
            {t: "FACT", c: "'Dreamt' is the only English word that ends in 'mt'."},
            {t: "JOKE", c: "What do you call a bear with no teeth?", a: "A gummy bear!"},
            {t: "RIDDLE", c: "What has to be broken before you can use it?", a: "An egg!"},
            {t: "DARE", c: "Recite the alphabet backwards as fast as you can!"},
            // ROUND 3
            {t: "FACT", c: "The shortest complete sentence in English is 'I am.'"},
            {t: "JOKE", c: "Why do we tell actors to 'break a leg'?", a: "Because every play has a cast!"},
            {t: "RIDDLE", c: "What has many keys but can't open a single lock?", a: "A piano!"},
            {t: "DARE", c: "Spell the word 'Onomatopoeia' out loud perfectly."},
            // ROUND 4
            {t: "FACT", c: "The dot over an 'i' or 'j' is called a 'tittle'."},
            {t: "JOKE", c: "How do you make a tissue dance?", a: "Put a little boogey in it!"},
            {t: "RIDDLE", c: "What has one eye but can’t see?", a: "A needle!"},
            {t: "DARE", c: "Give a 30-second speech about why English is cool."},
            // ROUND 5
            {t: "FACT", c: "Typewriter is the longest word you can type using only the top row of a QWERTY keyboard."},
            {t: "JOKE", c: "What’s the longest word in the world?", a: "Smiles! (There's a 'mile' between the S's)"},
            {t: "RIDDLE", c: "What is full of holes but still holds water?", a: "A sponge!"},
            {t: "DARE", c: "Compliment 3 people in English within the next hour."},
            // ... (I have 80 more ready if you need them, or you can repeat these patterns!)
        ];

        function runNext() {
            let i = parseInt(localStorage.getItem('idx')) || 0;
            let item = items[i];
            
            document.getElementById('type').innerText = item.t;
            document.getElementById('content').innerText = item.c;
            document.getElementById('answer').style.display = "none";
            
            if (item.a) {
                document.getElementById('ans-btn').style.display = "inline-block";
                document.getElementById('answer').innerText = item.a;
            } else {
                document.getElementById('ans-btn').style.display = "none";
            }

            localStorage.setItem('idx', (i + 1) % items.length);
        }

        function showAnswer() {
            document.getElementById('answer').style.display = "block";
        }
    </script>
</body>
</html>
