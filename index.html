<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Club Mystery</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Nunito', sans-serif; 
            text-align: center; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            flex-direction: column;
            background-color: #fdf2f8;
            background-image: radial-gradient(#fbcfe8 2px, transparent 2px);
            background-size: 30px 30px;
            position: relative;
            overflow: hidden;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Floating Doodles */
        .doodle { position: absolute; font-size: 2rem; opacity: 0.6; user-select: none; z-index: -1; animation: float 6s ease-in-out infinite; }
        .d1 { top: 10%; left: 10%; animation-delay: 0s; }
        .d2 { top: 20%; right: 15%; animation-delay: 1s; }
        .d3 { bottom: 25%; left: 15%; animation-delay: 2s; transform: rotate(-15deg); }
        .d4 { bottom: 15%; right: 10%; animation-delay: 3s; transform: rotate(15deg); }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* Main Mystery Card */
        .card { 
            background: white; 
            padding: 40px 30px; 
            border-radius: 30px; 
            box-shadow: 0 15px 35px rgba(219, 39, 119, 0.15); 
            width: 100%; 
            max-width: 340px; 
            margin-bottom: 25px; 
            border: 4px solid #fce7f3;
            box-sizing: border-box;
        }

        #type { color: #db2777; font-weight: 900; text-transform: uppercase; font-size: 1rem; letter-spacing: 2px; display: block; margin-bottom: 15px; }
        #content { font-size: 1.5rem; color: #1f2937; margin-bottom: 25px; min-height: 80px; display: flex; align-items: center; justify-content: center; line-height: 1.4; font-weight: 800; }
        
        #answer-box { display: none; color: #059669; font-weight: 900; margin: 15px 0; padding: 15px; border-top: 3px dashed #d1fae5; background: #ecfdf5; border-radius: 15px; font-size: 1.2rem; }
        
        .btn-ans { background: #f59e0b; color: white; border: none; padding: 16px 24px; border-radius: 20px; font-weight: 900; cursor: pointer; width: 100%; font-size: 1.1rem; margin-top: 10px; transition: 0.2s; display: none; box-shadow: 0 6px 0 #d97706; }
        .btn-ans:active { transform: translateY(6px); box-shadow: 0 0 0 #d97706; }

        /* Welcome & WhatsApp Section */
        .welcome-section {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 20px;
            width: 100%;
            max-width: 340px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            box-sizing: border-box;
            margin-bottom: 25px;
        }
        
        .welcome-text {
            color: #4b5563;
            font-size: 0.95rem;
            line-height: 1.5;
            margin: 0 0 15px 0;
            font-weight: 600;
        }

        .wa-link { display: inline-flex; align-items: center; justify-content: center; background: white; color: #1f2937; text-decoration: none; font-weight: 900; padding: 14px 28px; border-radius: 50px; box-shadow: 0 8px 20px rgba(37, 211, 102, 0.2); border: 2px solid #e5e7eb; transition: 0.2s; font-size: 1.1rem; width: 100%; box-sizing: border-box; }
        .wa-link:active { transform: scale(0.95); }
        .wa-icon { width: 28px; height: 28px; margin-left: 10px; fill: #25D366; }

        /* Motivational Quote Footer */
        .quote-box {
            color: #db2777;
            font-size: 0.9rem;
            font-style: italic;
            font-weight: 800;
            max-width: 300px;
            opacity: 0.8;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="doodle d1">✨</div>
    <div class="doodle d2">💬</div>
    <div class="doodle d3">📖</div>
    <div class="doodle d4">🎉</div>

    <div class="card">
        <span id="type">Loading...</span>
        <div id="content">Reading the mystery...</div>
        
        <div id="answer-box"></div>
        <button id="ans-btn" class="btn-ans" onclick="revealAnswer()">Reveal Answer 🔑</button>
    </div>

    <div class="welcome-section">
        <p class="welcome-text">Welcome to the English Club! We are a friendly, supportive community for students who want to practice speaking English without the stress. Tap the link below to join!</p>
        <a href="https://chat.whatsapp.com/IUc7l6fWtV1GsyCVFdBD5v?mode=gi_t" target="_blank" class="wa-link">
            Join the Club
            <svg class="wa-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
                <path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/>
            </svg>
        </a>
    </div>

    <div id="quote-display" class="quote-box"></div>

    <script>
        const icons = { "FACT": "💡", "JOKE": "😂", "RIDDLE": "🤔", "DARE": "🎯" };

        const quotes = [
            "Mistakes are just proof that you are trying! Keep going.",
            "A different language is a different vision of life.",
            "Don't be afraid to speak; every expert was once a beginner.",
            "The beautiful thing about learning is nobody can take it from you.",
            "Language is the road map of a culture.",
            "Do what you can, with what you have, where you are.",
            "Every time you speak, you are getting better and better.",
            "Small steps every day lead to big results.",
            "Learning a language is like opening a new window to the world.",
            "Confidence comes from practice. You've got this!"
        ];

        // Ensure you paste YOUR FULL 100 ITEMS HERE! (I've included the first 8 to save space)
       const items = [
            // 1-4
            {t: "FACT", c: "The word 'set' has the most definitions in the English dictionary."},

            {t: "RIDDLE", c: "What has one eye but can’t see?", a: "A needle!"},

            {t: "JOKE", c: "What’s the longest word in the world?", a: "Smiles! (There is a mile between the S's)"},
            {t: "RIDDLE", c: "What is full of holes but still holds water?", a: "A sponge!"},
            {t: "DARE", c: "Compliment 3 people in English today."},
            // 21-24
            {t: "FACT", c: "English is the official language of 67 countries."},
            {t: "JOKE", c: "What did the zero say to the eight?", a: "Nice belt!"},

            {t: "RIDDLE", c: "What comes down but never goes up?", a: "Rain!"},
            {t: "DARE", c: "Sing the chorus of your favorite English song out loud."},
            // 29-32
            {t: "FACT", c: "A new word is added to the English dictionary every two hours."},
            {t: "JOKE", c: "Why can't a nose be 12 inches long?", a: "Because then it would be a foot!"},
            {t: "RIDDLE", c: "What has hands but cannot clap?", a: "A clock!"},
            {t: "DARE", c: "Describe your current mood using only 3 English adjectives."},
            // 33-36
            {t: "FACT", c: "The most used noun in the English language is 'time'."},
            {t: "JOKE", c: "What do you call a fish with no eyes?", a: "A fsh!"},
            {t: "RIDDLE", c: "The more of this there is, the less you see. What is it?", a: "Darkness!"},
            {t: "DARE", c: "Try to touch your nose with your tongue!"},

            {t: "FACT", c: "About 4,000 words are added to the dictionary each year."},
            {t: "JOKE", c: "Why did the cookie go to the doctor?", a: "Because he felt crumb-y!"},
            {t: "RIDDLE", c: "What has a head and a tail but no body?", a: "A coin!"},

            {t: "FACT", c: "The word 'Queueing' is the only word with five consecutive vowels."},
            {t: "JOKE", c: "What do you call cheese that isn't yours?", a: "Nacho cheese!"},
            {t: "RIDDLE", c: "I’m tall when I’m young, and I’m short when I’m old. What am I?", a: "A candle!"},
            {t: "DARE", c: "High-five the person closest to you!"},
            // 45-48
            {t: "FACT", c: "The word 'girl' used to mean a young person of either gender."},
            {t: "JOKE", c: "Why did the bicycle fall over?", a: "Because it was two-tired!"},

            {t: "DARE", c: "Do 5 jumping jacks while counting out loud in English."},

            {t: "FACT", c: "There is no word in the English language that rhymes with 'month'."},

            {t: "FACT", c: "'E' is the most commonly used letter in the English alphabet."},

            {t: "DARE", c: "Give your best piece of advice in exactly 5 English words."},
            // 77-80
            {t: "FACT", c: "The original name for the butterfly was 'flutterby'."},
            {t: "JOKE", c: "How does the ocean say hello?", a: "It waves!"},
            {t: "RIDDLE", c: "What has 13 hearts, but no other organs?", a: "A deck of cards!"},
            {t: "DARE", c: "Try to say 'Red lorry, yellow lorry' five times fast!"},
            // 81-84
            {t: "FACT", c: "The oldest word in the English language is believed to be 'town'."},
            {t: "JOKE", c: "What did one wall say to the other?", a: "I'll meet you at the corner!"},
            {t: "RIDDLE", c: "What goes up and down but doesn't move?", a: "A staircase!"},
            {t: "DARE", c: "Yawn loudly and try to make someone else yawn too!"},
            // 85-88
            {t: "FACT", c: "The hashtag symbol (#) is officially called an octothorpe."},
            {t: "JOKE", c: "What do you call a sleeping dinosaur?", a: "A dino-snore!"},
            {t: "RIDDLE", c: "Where does today come before yesterday?", a: "The dictionary!"},
            {t: "DARE", c: "Draw a smiley face on your hand or paper."},
            // 89-92
            {t: "FACT", c: "A flock of crows is known as a 'murder'."},
            {t: "JOKE", c: "Why was the picture sent to jail?", a: "Because it was framed!"},
            {t: "RIDDLE", c: "If you drop me I’m sure to crack, but give me a smile and I’ll always smile back.", a: "A mirror!"},
            {t: "DARE", c: "Tell the person next to you why they are awesome."},
            // 93-96
            {t: "FACT", c: "The word 'SWIMS' upside-down is still 'SWIMS'."},
            {t: "JOKE", c: "What do you call a dog that does magic tricks?", a: "A labracadabrador!"},
            {t: "RIDDLE", c: "I shave every day, but my beard stays the same. What am I?", a: "A barber!"},
            {t: "DARE", c: "Strike a dramatic pose for 5 seconds!"},
            // 97-100
            {t: "FACT", c: "'Goodbye' originally comes from the phrase 'God be with ye'."},
            {t: "JOKE", c: "What kind of room has no doors or windows?", a: "A mushroom!"},
            {t: "RIDDLE", c: "I have a tail and a head, but no body. What am I?", a: "A coin!"},
            {t: "DARE", c: "Share this QR code with one other student today!"}
        ];

        function displayMysteryOnLoad() {
            let i = parseInt(localStorage.getItem('idx')) || 0;
            let item = items[i];
            
            // Set text & dynamic icon
            document.getElementById('type').innerText = `${icons[item.t]} ${item.t}`;
            document.getElementById('content').innerText = item.c;
            
            // Set Motivational Quote based on the same index so it changes every time
            document.getElementById('quote-display').innerText = `"${quotes[i % quotes.length]}"`;
            
            // Hide answer box initially
            document.getElementById('answer-box').style.display = "none";
            
            if (item.a) {
                // Show Reveal Button if there is an answer
                document.getElementById('ans-btn').style.display = "block";
                document.getElementById('answer-box').innerText = item.a;
            } else {
                // Hide Reveal Button completely for Facts/Dares
                document.getElementById('ans-btn').style.display = "none";
            }

            // Save the next item for tomorrow's scan
            localStorage.setItem('idx', (i + 1) % items.length);
        }

        function revealAnswer() {
            document.getElementById('answer-box').style.display = "block";
            document.getElementById('ans-btn').style.display = "none";
        }

        window.onload = displayMysteryOnLoad;
    </script>
</body>
</html>
