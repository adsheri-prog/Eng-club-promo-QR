<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Club Mystery</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Nunito', sans-serif; 
            text-align: center; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            flex-direction: column;
            background-color: #fdf2f8;
            background-image: radial-gradient(#fbcfe8 2px, transparent 2px);
            background-size: 30px 30px;
            position: relative;
            overflow: hidden;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Floating Doodles */
        .doodle { position: absolute; font-size: 2rem; opacity: 0.6; user-select: none; z-index: -1; animation: float 6s ease-in-out infinite; }
        .d1 { top: 10%; left: 10%; animation-delay: 0s; }
        .d2 { top: 20%; right: 15%; animation-delay: 1s; }
        .d3 { bottom: 25%; left: 15%; animation-delay: 2s; transform: rotate(-15deg); }
        .d4 { bottom: 15%; right: 10%; animation-delay: 3s; transform: rotate(15deg); }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* Welcome & WhatsApp Section */
        .welcome-section {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 20px;
            width: 100%;
            max-width: 340px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            box-sizing: border-box;
            margin-bottom: 20px;
            border: 2px solid #fce7f3;
        }
        
        .welcome-text { color: #4b5563; font-size: 0.95rem; line-height: 1.5; margin: 0 0 15px 0; font-weight: 800; }

        /* --- THE WHEEL SECTION --- */
        #wheel-section { display: flex; flex-direction: column; align-items: center; width: 100%; margin-bottom: 20px; }
        
        .wheel-container { position: relative; width: 260px; height: 260px; margin: 10px auto 20px auto; }
        
        /* The Pointer Arrow */
        .pointer {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 18px solid transparent;
            border-right: 18px solid transparent;
            border-top: 30px solid #1f2937;
            z-index: 10;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.2));
        }

        /* The Spinning Wheel */
        .wheel {
            width: 100%; height: 100%; border-radius: 50%;
            background: conic-gradient(
                #f472b6 0deg 90deg,   /* Pink: DARE */
                #60a5fa 90deg 180deg, /* Blue: FACT */
                #a78bfa 180deg 270deg,/* Purple: RIDDLE */
                #fbbf24 270deg 360deg /* Yellow: JOKE */
            );
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            border: 6px solid white;
            box-sizing: border-box;
            position: relative;
        }

        /* Wheel Text Labels */
        .wheel-text { position: absolute; font-weight: 900; color: white; font-size: 1.1rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); letter-spacing: 1px; }
        .txt-dare { top: 18%; right: 12%; transform: rotate(45deg); }
        .txt-fact { bottom: 18%; right: 12%; transform: rotate(135deg); }
        .txt-riddle { bottom: 18%; left: 10%; transform: rotate(225deg); }
        .txt-joke { top: 18%; left: 12%; transform: rotate(315deg); }

        .btn-spin { background: #db2777; color: white; border: none; padding: 16px 30px; border-radius: 50px; font-weight: 900; cursor: pointer; font-size: 1.2rem; transition: 0.2s; box-shadow: 0 6px 0 #be185d; text-transform: uppercase; letter-spacing: 2px; }
        .btn-spin:active { transform: translateY(6px); box-shadow: 0 0 0 #be185d; }
        .btn-spin:disabled { background: #9ca3af; box-shadow: 0 6px 0 #6b7280; cursor: not-allowed; }

        /* --- THE RESULT CARD (Hidden at first) --- */
        #result-section { display: none; width: 100%; max-width: 340px; margin-bottom: 25px; }
        
        .card { background: white; padding: 40px 30px; border-radius: 30px; box-shadow: 0 15px 35px rgba(219, 39, 119, 0.15); border: 4px solid #fce7f3; box-sizing: border-box; }
        #type { color: #db2777; font-weight: 900; text-transform: uppercase; font-size: 1rem; letter-spacing: 2px; display: block; margin-bottom: 15px; }
        #content { font-size: 1.5rem; color: #1f2937; margin-bottom: 25px; min-height: 80px; display: flex; align-items: center; justify-content: center; line-height: 1.4; font-weight: 800; }
        #answer-box { display: none; color: #059669; font-weight: 900; margin: 15px 0; padding: 15px; border-top: 3px dashed #d1fae5; background: #ecfdf5; border-radius: 15px; font-size: 1.2rem; }
        
        .btn-ans { background: #f59e0b; color: white; border: none; padding: 16px 24px; border-radius: 20px; font-weight: 900; cursor: pointer; width: 100%; font-size: 1.1rem; margin-top: 10px; transition: 0.2s; display: none; box-shadow: 0 6px 0 #d97706; }
        .btn-ans:active { transform: translateY(6px); box-shadow: 0 0 0 #d97706; }

        /* WhatsApp Button Below Everything */
        .wa-link { display: inline-flex; align-items: center; justify-content: center; background: white; color: #1f2937; text-decoration: none; font-weight: 900; padding: 14px 28px; border-radius: 50px; box-shadow: 0 8px 20px rgba(37, 211, 102, 0.2); border: 2px solid #e5e7eb; transition: 0.2s; font-size: 1.1rem; width: 100%; box-sizing: border-box; }
        .wa-link:active { transform: scale(0.95); }
        .wa-icon { width: 28px; height: 28px; margin-left: 10px; fill: #25D366; }

        .quote-box { color: #db2777; font-size: 0.9rem; font-style: italic; font-weight: 800; max-width: 300px; opacity: 0.8; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="doodle d1">✨</div>
    <div class="doodle d2">💬</div>
    <div class="doodle d3">📖</div>
    <div class="doodle d4">🎉</div>

    <div class="welcome-section">
        <p class="welcome-text">Welcome to the English Club! We are a friendly, supportive community for students who want to practice speaking English without the stress.</p>
        
        <a href="https://chat.whatsapp.com/IUc7l6fWtV1GsyCVFdBD5v?mode=gi_t" target="_blank" class="wa-link">
            Join the Club Here!

        </a>
    </div>

    <div id="wheel-section">
        <div class="wheel-container">
            <div class="pointer"></div>
            <div class="wheel" id="wheel">
                <span class="wheel-text txt-dare">DARE</span>
                <span class="wheel-text txt-fact">FACT</span>
                <span class="wheel-text txt-riddle">RIDDLE</span>
                <span class="wheel-text txt-joke">JOKE</span>
            </div>
        </div>
        <button id="spin-btn" class="btn-spin" onclick="spinWheel()">Spin to Play!</button>
    </div>

    <div id="result-section">
        <div class="card">
            <span id="type">Loading...</span>
            <div id="content">Reading the mystery...</div>
            <div id="answer-box"></div>
            <button id="ans-btn" class="btn-ans" onclick="revealAnswer()">Reveal Answer 🔑</button>
        </div>
    </div>

    <div id="quote-display" class="quote-box"></div>

    <script>

            // 89-92
            {t: "FACT", c: "A flock of crows is known as a 'murder'."},
            {t: "JOKE", c: "Why was the picture sent to jail?", a: "Because it was framed!"},
            {t: "RIDDLE", c: "If you drop me I’m sure to crack, but give me a smile and I’ll always smile back.", a: "A mirror!"},
            {t: "DARE", c: "Tell the person next to you why they are awesome."},
            // 93-96
            {t: "FACT", c: "The word 'SWIMS' upside-down is still 'SWIMS'."},
            {t: "JOKE", c: "What do you call a dog that does magic tricks?", a: "A labracadabrador!"},
            {t: "RIDDLE", c: "I shave every day, but my beard stays the same. What am I?", a: "A barber!"},
            {t: "DARE", c: "Strike a dramatic pose for 5 seconds!"},
            // 97-100
            {t: "FACT", c: "'Goodbye' originally comes from the phrase 'God be with ye'."},
            {t: "JOKE", c: "What kind of room has no doors or windows?", a: "A mushroom!"},

        let currentRotation = 0;

        function setRandomQuote() {
            const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
            document.getElementById('quote-display').innerText = `"${randomQuote}"`;
        }

        window.onload = function() {
            setRandomQuote();
        };

        function spinWheel() {
            const spinBtn = document.getElementById('spin-btn');
            spinBtn.disabled = true;
            spinBtn.innerText = "Spinning...";

            // Pick a random degree and add 5 full spins (1800 degrees) so it looks cool
            const randomDegree = Math.floor(Math.random() * 360);
            const totalSpin = 1800 + randomDegree;
            currentRotation += totalSpin;
            
            // Spin the CSS element
            document.getElementById('wheel').style.transform = `rotate(${currentRotation}deg)`;

            // Calculate what it landed on (The pointer is at top = 0 degrees)
            const normalizedRotation = (360 - (currentRotation % 360)) % 360;
            
            let resultType = "";
            if (normalizedRotation >= 0 && normalizedRotation < 90) resultType = "DARE";
            else if (normalizedRotation >= 90 && normalizedRotation < 180) resultType = "FACT";
            else if (normalizedRotation >= 180 && normalizedRotation < 270) resultType = "RIDDLE";
            else resultType = "JOKE";

            // Wait 4 seconds for the wheel to stop, then show the result!
            setTimeout(() => {
                showResultCard(resultType);
            }, 4000);
        }

        function showResultCard(category) {
            // Find all items that match what the wheel landed on
            const matchingItems = items.filter(item => item.t === category);
            
            // Pick a random item from that specific category
            const chosenItem = matchingItems[Math.floor(Math.random() * matchingItems.length)];

            // Hide the wheel and show the card
            document.getElementById('wheel-section').style.display = 'none';
            document.getElementById('result-section').style.display = 'block';

            // Fill out the card details
            document.getElementById('type').innerText = `${icons[chosenItem.t]} ${chosenItem.t}`;
            document.getElementById('content').innerText = chosenItem.c;
            
            // Handle the reveal button logic
            document.getElementById('answer-box').style.display = "none";
            if (chosenItem.a) {
                document.getElementById('ans-btn').style.display = "block";
                document.getElementById('answer-box').innerText = chosenItem.a;
            } else {
                document.getElementById('ans-btn').style.display = "none";
            }
        }

        function revealAnswer() {
            document.getElementById('answer-box').style.display = "block";
            document.getElementById('ans-btn').style.display = "none";
        }
    </script>
</body>
</html>
